// ============================================================
// CS2 Crosshair Cycler — Tap Y to switch between crosshairs
// Place in: Steam\steamapps\common\Counter-Strike Global Offensive\game\csgo\cfg\
// Load with: exec crosshair_cycle
// ============================================================


// --- Toggle aliases ---
alias "ch1" "exec crosshairs/crosshair1.cfg;   alias xhair_next ch2; echo [Crosshair] 1"
alias "ch2" "exec crosshairs/crosshair2.cfg; alias xhair_next ch3;   echo [Crosshair] 2"
alias "ch3" "exec crosshairs/crosshair3.cfg; alias xhair_next ch4;   echo [Crosshair] 3"
alias "ch4" "exec crosshairs/crosshair4.cfg; alias xhair_next ch1;   echo [Crosshair] 4"

// --- Start on X crosshair ---
ch1

// --- Bind Y to cycle ---
bind "scancode28" "xhair_next"

echo [Crosshair Cycler] Loaded! Press Y to toggle between crosshairs.
