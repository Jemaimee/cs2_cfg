// ============================================================
// CS2 Crosshair Cycler — Tap Y to switch between crosshairs
// Place in: Steam\steamapps\common\Counter-Strike Global Offensive\game\csgo\cfg\
// Load with: exec crosshair_cycle
// ============================================================

// --- X crosshair (split into parts) ---
alias "X_ch_1" "cl_crosshairgap -2.9; cl_crosshair_outlinethickness 1.5; cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 0"
alias "X_ch_2" "cl_crosshairalpha 255; cl_crosshair_dynamic_splitdist 3; cl_crosshair_recoil false; cl_fixedcrosshairgap 3; cl_crosshaircolor 5"
alias "X_ch_3" "cl_crosshair_drawoutline 1; cl_crosshair_dynamic_splitalpha_innermod 0; cl_crosshair_dynamic_splitalpha_outermod 1"
alias "X_ch_4" "cl_crosshair_dynamic_maxdist_splitratio 1; cl_crosshairthickness 0.4; cl_crosshairdot 1; cl_crosshairgap_useweaponvalue 0"
alias "X_ch_5" "cl_crosshairusealpha 1; cl_crosshair_t 0; cl_crosshairstyle 4; cl_crosshairsize 0.8"
alias "X_crosshair" "X_ch_1; X_ch_2; X_ch_3; X_ch_4; X_ch_5"

// --- Dot crosshair (split into parts, only crosshairsize differs) ---
alias "dot_ch_1" "cl_crosshairgap -2.9; cl_crosshair_outlinethickness 1.5; cl_crosshaircolor_r 0; cl_crosshaircolor_g 255; cl_crosshaircolor_b 0"
alias "dot_ch_2" "cl_crosshairalpha 255; cl_crosshair_dynamic_splitdist 3; cl_crosshair_recoil false; cl_fixedcrosshairgap 3; cl_crosshaircolor 5"
alias "dot_ch_3" "cl_crosshair_drawoutline 1; cl_crosshair_dynamic_splitalpha_innermod 0; cl_crosshair_dynamic_splitalpha_outermod 1"
alias "dot_ch_4" "cl_crosshair_dynamic_maxdist_splitratio 1; cl_crosshairthickness 0.4; cl_crosshairdot 1; cl_crosshairgap_useweaponvalue 0"
alias "dot_ch_5" "cl_crosshairusealpha 1; cl_crosshair_t 0; cl_crosshairstyle 4; cl_crosshairsize 0"
alias "dot_crosshair" "dot_ch_1; dot_ch_2; dot_ch_3; dot_ch_4; dot_ch_5"

// --- Toggle aliases ---
alias "xhair_to_X"   "X_crosshair;   alias xhair_next xhair_to_dot; echo [Crosshair] X"
alias "xhair_to_dot" "dot_crosshair; alias xhair_next xhair_to_X;   echo [Crosshair] Dot"

// --- Start on X crosshair ---
xhair_to_X

// --- Bind Y to cycle ---
bind "scancode28" "xhair_next"

echo [Crosshair Cycler] Loaded! Press Y to toggle between X and Dot crosshairs.
