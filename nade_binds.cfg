// ============================================================
// CS2 Grenade Binds — AZERTY layout (scancodes)
// Place in: Steam\steamapps\common\Counter-Strike Global Offensive\game\csgo\cfg\
// Load with: exec nade_binds
// ============================================================
//
// Physical key → Scancode → Nade
//   scancode20 →    Q     → Flashbang
//   scancode27 →    X     → HE Grenade
//   scancode6  →    C     → Smoke
//   scancode25 →    V     → Molotov / Incendiary
//

// ============================================================

// --- Flashbang (scancode20) ---
alias "nade_flash" "slot7"
bind "scancode20" "nade_flash"

// --- HE Grenade (X on AZERTY = scancode27) ---
alias "nade_he" "slot6"
bind "scancode6" "nade_he"

// --- Smoke (C on AZERTY = scancode6) ---
alias "nade_smoke" "slot8"

bind "scancode5" "nade_smoke"

// --- Molotov / Incendiary (V on AZERTY = scancode25) ---
alias "nade_molly" "slot10"

bind "scancode25" "nade_molly"

echo [Nade Binds] Loaded! Hold keys to switch to nade, release to go back.
