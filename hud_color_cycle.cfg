// ============================================================
// CS2 HUD Color Cycler — Tap F to step through 9 HUD colors
// Place in: Steam\steamapps\common\Counter-Strike Global Offensive\game\csgo\cfg\
// Load with: exec hud_color_cycle
// ============================================================

// cl_hud_color values:
//   3  = Dark Blue
//   4  = Purple
//   5  = Red
//   6  = Orange
//   7  = Yellow
//   8  = Green
//   9  = Aquamarine
//  10  = Pink
//  11  = Yellow-Green

// --- Each alias sets the color and points hud_next to the following step ---
alias "hud_c0" "cl_hud_color 3;  alias hud_next hud_c1; echo [HUD] Dark Blue"
alias "hud_c1" "cl_hud_color 4;  alias hud_next hud_c2; echo [HUD] Purple"
alias "hud_c2" "cl_hud_color 5;  alias hud_next hud_c3; echo [HUD] Red"
alias "hud_c3" "cl_hud_color 6;  alias hud_next hud_c4; echo [HUD] Orange"
alias "hud_c4" "cl_hud_color 7;  alias hud_next hud_c5; echo [HUD] Yellow"
alias "hud_c5" "cl_hud_color 8;  alias hud_next hud_c6; echo [HUD] Green"
alias "hud_c6" "cl_hud_color 9;  alias hud_next hud_c7; echo [HUD] Aquamarine"
alias "hud_c7" "cl_hud_color 10; alias hud_next hud_c8; echo [HUD] Pink"
alias "hud_c8" "cl_hud_color 11; alias hud_next hud_c0; echo [HUD] Yellow-Green"

// --- Start at Dark Blue ---
hud_c0

// --- Bind F: each press advances one color ---
alias "+cycle_inspect" "hud_next; +lookatweapon"
alias "-cycle_inspect" "-lookatweapon"
bind "scancode9" "+cycle_inspect"

echo [HUD Color Cycler] Loaded! Tap F to cycle through 9 HUD colors.